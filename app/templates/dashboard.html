<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  {% include "_theme_head.html" %}
</head>
<body class="dashboard-page">
  <main class="page">
    {% if messages %}
      <div class="toasts" aria-live="polite" aria-atomic="true">
        {% for item in messages %}
          <div class="toast toast-{{ item['category'] }}">{{ item["message"] }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <section class="card dashboard-card">
      <div class="dashboard-header">
        <div>
          <p class="section-kicker">Control Center</p>
          <h2 class="page-title">Dashboard</h2>
          <p class="page-subtle-copy">
            You are signed in as <strong>{{ email }}</strong>.
          </p>
        </div>

        {% set minimal = false %}
        {% include "_theme_toggle.html" %}
      </div>

      <div class="dashboard-actions">
        <a class="btn btn-soft btn-inline" href="{{ url_for('web_meetings') }}">Meetings</a>
        <a class="btn btn-soft btn-inline" href="{{ url_for('web_calendar') }}">Calendar</a>
        <a class="btn btn-soft btn-inline" href="{{ url_for('web_availability') }}">Availability</a>
      </div>

      <form method="POST" action="{{ url_for('web_logout') }}">
        <button class="btn btn-primary btn-inline-wide" type="submit">Log out</button>
      </form>
    </section>
  </main>
</body>
</html>
