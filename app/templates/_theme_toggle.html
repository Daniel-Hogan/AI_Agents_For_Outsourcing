<button type="button" class="theme-toggle{% if minimal %} theme-toggle-minimal{% endif %}" data-theme-toggle aria-label="Activate dark mode" aria-pressed="false">
  <span class="theme-toggle-track" aria-hidden="true">
    <span class="theme-toggle-thumb"></span>
  </span>
  <span class="theme-toggle-copy">
    <span class="theme-toggle-label" data-theme-toggle-label>Light mode</span>
    <span class="theme-toggle-meta" data-theme-toggle-meta>Switch to dark mode</span>
  </span>
</button>
